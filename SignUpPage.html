<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register for Events</title>
    <link href="style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body>
    <div class="header">
     <div class="Button_sect">
     <a href="Index.html">Home</a>
     </div>
     <h1 id="PageTitle">Register for Event</h1>
    </div>
    <br>
    <div class="SoloItems registration-form">
        <h2>Sign Up</h2>
        <form action="ThankYou.html" method="post" enctype="text/plain">
        <label for="Event">Choose Event: </label>
        <select id="Event" name="Event">
            <option value="CoffeeBrewingEvent">Coffee Brewing Event</option>
            <option value="TastingEvent">Coffee Tasting Event</option>
        </select>
        
        <br><br>
        <label for="fname">First Name:</label>
        <input type="text" id="fname" name="name" placeholder="First Name" required>
        
        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lastname" placeholder="Last Name" required>
        
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" placeholder="email@example.com" required>
        
        <br><br>
        <button type="submit">Register</button>
    </form>
</div>
</body>
</html>
