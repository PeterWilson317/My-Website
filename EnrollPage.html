<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Enrollment</title>
    <link href="style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body>
    <div class="header">
     <div class="Button_sect">
     <a href="Index.html">Home</a>
     </div>
     <h1 id="PageTitle">Enrollment</h1>
    </div>
    <br>
    <div class="SoloItems registration-form">
        <h2>Register</h2>
        <form action="ThankYou.html" method="post" enctype="text/plain">
            <label for="fname">First Name:</label>
            <input id="fname" type="text" name="name" placeholder="Name" required>
            
            <label for="lname">Last Name:</label>
            <input id="lname" type="text" name="lastname" placeholder="Last Name" required>

            <label for="email">Email Address:</label>
            <input id="email" type="email" name="email" placeholder="email">
            <br><br>
            <button type="submit">Register</button>
        </form>
    </div>
</body>
</html>
